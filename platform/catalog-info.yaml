apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: jest-api
  description: Golden Path Node.js API generated from template-node-api.
  annotations:
    github.com/project-slug: ohanyere/jest-api
    backstage.io/kubernetes-id: jest-api
    platform.ohanyere.io/template: template-node-api
    platform.ohanyere.io/standards-repo: ohanyere/platform-core
  tags:
    - nodejs
    - typescript
    - api
    - golden-path
spec:
  type: service
  lifecycle: production
  owner: group:default/Payments
  system: Payments
  providesApis:
    - jest-api-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: jest-api-api
  description: HTTP API for jest-api.
spec:
  type: openapi
  lifecycle: production
  owner: group:default/Payments
  definition: |
    openapi: 3.0.3
    info:
      title: jest-api
      version: 1.0.0
    paths:
      /healthz:
        get:
          responses:
            "200":
              description: Health status
