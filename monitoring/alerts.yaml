apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: jest-api-alerts
  labels:
    app.kubernetes.io/name: jest-api
    release: prometheus
spec:
  groups:
    - name: jest-api.availability
      rules:
        - alert: jest-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="jest-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="jest-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Payments
          annotations:
            summary: jest-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: jest-apiUnavailable
          expr: up{job="jest-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Payments
          annotations:
            summary: jest-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
